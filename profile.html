<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Wells of Salvation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⛲ Wells of Salvation</h1>
        <p><em>"With joy you will draw water from the wells of salvation." – Isaiah 12:3</em></p>
        <nav>
            <a href="index.html">Home</a> |
            <a href="#bible">Bible</a> |
            <a href="#study">Study Guides</a> |
            <a href="#audio">Audio Messages</a> |
            <a href="fr.html">Français</a> |
            <a href="signin.html" id="nav-auth">Sign In</a>
        </nav>
    </header>

    <main>
        <section style="max-width: 600px; margin: 0 auto; padding: 20px;">
            <h2>My Profile</h2>
            <div id="user-info" style="background: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                Loading...
            </div>
            <button id="sign-out" style="padding: 10px 20px; background-color: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer;">Sign Out</button>
            <p><a href="index.html">← Back to Home</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wells of Salvation. All rights reserved.</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // 🔐 PASTE THE SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
              apiKey: "AIzaSyCNXgUYO3ylocvjmnR4V6TvAU04iDUJW0Q",
              authDomain: "wells-of-salvation.firebaseapp.com",
              projectId: "wells-of-salvation",
              storageBucket: "wells-of-salvation.firebasestorage.app",
              messagingSenderId: "137343442147",
              appId: "1:137343442147:web:3a3c81a660887954d9f9d6"

        };

        firebase.initializeApp(firebaseConfig);

        const userInfoDiv = document.getElementById('user-info');
        const navAuth = document.getElementById('nav-auth');
        const signOutBtn = document.getElementById('sign-out');

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // Display user info
                userInfoDiv.innerHTML = `
                    <p><strong>Name:</strong> ${user.displayName || 'Not provided'}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>User ID:</strong> ${user.uid}</p>
                `;
                navAuth.textContent = 'Profile';
                navAuth.href = 'profile.html';
            } else {
                // Not logged in – redirect to signin
                window.location.href = 'signin.html';
            }
        });

        signOutBtn.addEventListener('click', () => {
            firebase.auth().signOut().then(() => {
                window.location.href = 'index.html';
            }).catch(error => alert('Error signing out: ' + error.message));
        });
    </script>
</body>
</html>
